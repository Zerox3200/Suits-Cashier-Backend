# CI — test and validate on every push/PR (does not deploy).
# Deployment is handled by deploy.yml

name: CI - Test and Build

on:
  push:
    branches: [main]
  pull_request:
    branches: [main]

concurrency:
  group: suits-cashier-backend-ci-${{ github.ref }}
  cancel-in-progress: true

jobs:
  test:
    name: Test and validate
    runs-on: ubuntu-latest

    steps:
      - name: Checkout repository
        uses: actions/checkout@v4

      - name: Setup Node.js
        uses: actions/setup-node@v4
        with:
          node-version: "18"
          cache: npm

      - name: Install dependencies
        run: npm ci

      - name: Run linter
        run: npm run lint || echo "Linter not configured"

      - name: Run tests
        run: npm test

      - name: Syntax check entrypoint
        run: node --check index.js

      - name: Syntax check app router
        run: node --check src/app.router.js
